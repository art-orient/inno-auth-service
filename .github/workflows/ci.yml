name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-test-sonar-docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Cache Maven
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 4. Ensure Docker daemon is running
      - name: Ensure Docker is running
        run: docker info

      # 5. Build + Test
      - name: Build and Test
        run: mvn -B clean verify

      # 6. SonarQube Analysis
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=art-orient_authservice \
            -Dsonar.organization=art-orient \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=$SONAR_TOKEN

      # 7. Build Docker Image
      - name: Build Docker image
        run: docker build -t auth_service_app .

      # 8. Save Docker image as artifact
      - name: Save Docker image
        run: docker save auth_service_app | gzip > auth_service_app.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth_service_docker_image
          path: auth_service_app.tar.gz